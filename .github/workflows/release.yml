name: Release

on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: "Build Linux"
        type: boolean
        default: true
      build_windows:
        description: "Build Windows"
        type: boolean
        default: true
      build_macos:
        description: "Build macOS"
        type: boolean
        default: true
      build_android:
        description: "Build Android"
        type: boolean
        default: true
      build_ios:
        description: "Build iOS"
        type: boolean
        default: true

jobs:
  patch:
    uses: ./.github/workflows/reusable-patch.yml
    with:
      upload_project: true
    secrets:
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

  build-linux:
    name: Build Linux
    if: ${{ inputs.build_linux }}
    needs: patch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download patched project
        uses: actions/download-artifact@v8
        with:
          name: patched-project
          path: RippedProject

      - name: Restore NuGet packages
        run: |
          dotnet tool install --global NuGetForUnity.Cli
          nugetforunity restore RippedProject

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Build game
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: RippedProject
          targetPlatform: StandaloneLinux64
          buildName: Frontline
          versioning: None

      - name: Build AppImage
        run: |
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool.AppImage
          chmod +x appimagetool.AppImage
          cp -r build/StandaloneLinux64/ Platforms/AppImage/
          rm -rf Platforms/AppImage/Frontline_BackUpThisFolder_ButDontShipItWithYourGame
          cp RippedProject/Assets/Texture2D/app_icon.png Platforms/AppImage/
          ./appimagetool.AppImage Platforms/AppImage Frontline.AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Frontline.AppImage
          path: Frontline.AppImage

  build-windows:
    name: Build Windows
    if: ${{ inputs.build_windows }}
    needs: patch
    runs-on: windows-latest
    steps:
      - name: Download patched project
        uses: actions/download-artifact@v8
        with:
          name: patched-project
          path: RippedProject

      - name: Restore NuGet packages
        run: |
          dotnet tool install --global NuGetForUnity.Cli
          nugetforunity restore RippedProject

      - name: Build game
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: RippedProject
          targetPlatform: StandaloneWindows64
          buildName: Frontline
          versioning: None

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Frontline-Windows
          path: |
            build/StandaloneWindows64
            !build/**/*_BackUpThisFolder_ButDontShipItWithYourGame

  build-macos:
    name: Build macOS
    if: ${{ inputs.build_macos }}
    needs: patch
    runs-on: macos-latest
    steps:
      - name: Download patched project
        uses: actions/download-artifact@v8
        with:
          name: patched-project
          path: RippedProject

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore NuGet packages
        run: |
          dotnet tool install --global NuGetForUnity.Cli
          nugetforunity restore RippedProject

      - name: Build game
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: RippedProject
          targetPlatform: StandaloneOSX
          buildName: Frontline
          versioning: None

      - name: Create DMG
        run: |
          npm install --global create-dmg
          create-dmg build/StandaloneOSX/Frontline.app \
            build/StandaloneOSX/ \
            --no-version-in-filename \
            --no-code-sign \
            --dmg-title=Frontline

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Frontline.dmg
          path: build/StandaloneOSX/Frontline.dmg

  build-android:
    name: Build Android
    if: ${{ inputs.build_android }}
    needs: patch
    runs-on: ubuntu-latest
    steps:
      - name: Download patched project
        uses: actions/download-artifact@v8
        with:
          name: patched-project
          path: RippedProject

      - name: Restore NuGet packages
        run: |
          dotnet tool install --global NuGetForUnity.Cli
          nugetforunity restore RippedProject

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Build game
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: RippedProject
          targetPlatform: Android
          buildName: Frontline
          versioning: None

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Frontline.apk
          path: build/Android/Frontline.apk

  build-ios:
    name: Build iOS
    if: ${{ inputs.build_ios }}
    needs: patch
    runs-on: macos-latest
    steps:
      - name: Download patched project
        uses: actions/download-artifact@v8
        with:
          name: patched-project
          path: RippedProject

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore NuGet packages
        run: |
          dotnet tool install --global NuGetForUnity.Cli
          nugetforunity restore RippedProject

      - name: Build game
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: RippedProject
          targetPlatform: iOS
          buildName: Frontline
          versioning: None

      - name: Build Xcode archive
        run: |
          cd build/iOS/Frontline
          xcodebuild -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -archivePath Frontline.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean archive

      - name: Package IPA
        run: |
          cd build/iOS/Frontline
          mkdir Payload
          cp -r Frontline.xcarchive/Products/Applications/*.app Payload/
          zip -r Frontline.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Frontline.ipa
          path: build/iOS/Frontline/Frontline.ipa
