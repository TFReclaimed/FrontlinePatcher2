name: Patch Project

on:
  workflow_call:

jobs:
  patch-project:
    name: Patch Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Install FFmpeg
        run: sudo apt-get install ffmpeg
      - name: Download tools
        run: |
          curl -L "https://github.com/AssetRipper/AssetRipper/releases/download/1.3.12/AssetRipper_linux_x64.zip" -o AssetRipper.zip
          curl -L "https://github.com/vgmstream/vgmstream/releases/download/r2083/vgmstream-linux-cli.zip" -o vgmstream.zip
          unzip -o AssetRipper.zip -d .
          unzip -o vgmstream.zip -d .
          rm AssetRipper.zip vgmstream.zip
          chmod +x AssetRipper.GUI.Free
          chmod +x vgmstream-cli
      - name: Download game files
        run: |
          curl -L "https://cdn.tfflinternal.com/original/AndroidLaunchBundles.zip" -o AndroidBundles.zip
          curl -L "https://cdn.tfflinternal.com/original/Titanfall_Frontline_1.0.17334.apk" -o Frontline.apk
          unzip -o AndroidBundles.zip -d .
          rm AndroidBundles.zip
      - name: Setup Git
        run: |
          git config --global user.email "auto@mated.null"
          git config --global user.name "GitHub Actions"
      - name: Run patcher
        run: python patcher.py setup "Frontline.apk" "Android"
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      - name: Upload project on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: failed-project-state
          path: RippedProject/
          include-hidden-files: true
          retention-days: 1
      - name: Upload patched project
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: patched-project
          path: RippedProject/
          retention-days: 1